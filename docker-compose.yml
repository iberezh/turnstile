# Local infra. Override POSTGRES_PORT if 5432 is taken.
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: turnstile
      POSTGRES_PASSWORD: turnstile
      POSTGRES_DB: turnstile
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U turnstile -d turnstile']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
