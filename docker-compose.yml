# Local infra. Postgres is published on a dedicated host port (5436) to avoid clashing with
# other local Postgres instances; override POSTGRES_PORT if needed.
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: turnstile
      POSTGRES_PASSWORD: turnstile
      POSTGRES_DB: turnstile
    ports:
      - '${POSTGRES_PORT:-5436}:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U turnstile -d turnstile']
      interval: 5s
      timeout: 5s
      retries: 10

  # Separate physical instance for the platform control plane — admin identities and the platform
  # audit trail never share a database (or credentials) with tenant data.
  admin-postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: turnstile_admin
      POSTGRES_PASSWORD: turnstile_admin
      POSTGRES_DB: turnstile_admin
    ports:
      - '${ADMIN_POSTGRES_PORT:-5437}:5432'
    volumes:
      - admin-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U turnstile_admin -d turnstile_admin']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
  admin-pgdata:
